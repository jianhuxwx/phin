version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - phin-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: phin
      POSTGRES_USER: phin
      POSTGRES_PASSWORD: phin_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - phin-network

  meilisearch:
    image: getmeili/meilisearch:v1.7
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: phin_dev_key
    ports:
      - '7700:7700'
    volumes:
      - meili-data:/meili_data
    networks:
      - phin-network

volumes:
  redis-data:
  postgres-data:
  meili-data:

networks:
  phin-network:
    driver: bridge

